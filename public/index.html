<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Website Logo / Favicon -->
    <link rel="icon" type="image/jpeg" href="%PUBLIC_URL%/FullLogo.jpeg" />

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- Website Description -->
    <meta name="description" content="Prime Pro Projects - Hyderabad's trusted real estate platform" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/FullLogo.jpeg" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Performance: early connections to image CDNs -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="preconnect" href="https://cbuildfiles.blob.core.windows.net" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://cbuildfiles.blob.core.windows.net" />

    <!-- Google Fonts — preconnect then load (faster than @import in CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />

    <!-- Preload the first hero image (LCP element) so it starts immediately -->

      rel="preload"
      as="image"
      href="https://cbuildfiles.blob.core.windows.net/ventura-estate-developers/propertyimages/2024-12-05/a4a69c1d-3dd5-475f-8116-245bd4ecc184c7.jpg"
    />

    <meta name="google-site-verification" content="0IBg-hzXuueCgi4y-xc-pwVT111OhjreQhcCNivN7g4" />

    <!-- SEO: Default Open Graph tags (pages override these via react-helmet-async) -->

    <meta property="og:site_name" content="Prime Pro Projects" />
    <meta property="og:image" content="https://www.primeproprojects.in/FullLogo.jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@primeproproject" />

        "@type": "PostalAddress",
        "streetAddress": "3-225, Kavuri Hills Rd, CBI Colony",
